# AI tools declaration (declared use is NOT penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and pair-programming
  the scoring pipeline. All design decisions, weight tuning, and manual
  validation of the top-ranked candidates were done by the author. No candidate
  data was sent to any hosted LLM; all ranking runs locally and offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Transparent hybrid scoring (no training — the data is unlabeled). The JD is
  encoded as weighted requirements. Per candidate: title fit (sets a ceiling so
  a non-technical title cannot be rescued by a stuffed skill list),
  trust-weighted skill relevance (claimed proficiency discounted by assessment
  scores, endorsements and duration to defeat keyword stuffers), semantic
  similarity to the JD (in-process TF-IDF; optional bge-small embeddings),
  experience curve peaking at 6-8 yrs, location (relocation + work-mode), and
  notice period. These are gated by multiplicative penalties (CV/speech-only
  domain mismatch, services-only career, framework-only LLM exposure,
  job-hopping, a small big-tech nudge) and a behavioral availability modifier
  built from ~18 of the 23 Redrob signals. Honeypots are sunk via profile
  consistency checks (0% in the top 100). Scores are intentionally unsaturated
  so the top-10 ordering is meaningful. Runs in ~1 min for 100K candidates on
  CPU with no network.

